name: Check vscodium Update

on:
  workflow_dispatch: # 允许手动触发测试
  schedule:
    - cron: '0 */23 * * *' # 每23小时检查一次，避免过于频繁请求 API

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 获取所有标签以便检查本地是否存在

      - name: Get Latest vscodium Version
        id: get_version
        run: |
          # 获取 vscodium/vscodium 仓库的最新 Release 信息
          # 使用 jq 解析 JSON，获取最新的 tag_name
          LATEST_RELEASE_JSON=$(curl -s https://api.github.com/repos/VSCodium/vscodium/releases/latest)
          
          LATEST_TAG=$(echo $LATEST_RELEASE_JSON | jq -r '.tag_name')
          
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
            echo "Failed to fetch latest version"
            exit 1
          fi

          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_ENV
          echo "Detected vscodium Version: ${LATEST_TAG}"

      - name: Check if Release Already Exists
        id: check_existence
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view ${{ env.latest_tag }} -R ${{ github.repository }} >/dev/null 2>&1 && echo "should_update=false" >> $GITHUB_ENV || echo "should_update=true" >> $GITHUB_ENV

      - name: Trigger Build Workflow
        if: env.should_update == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const latestTag = process.env.latest_tag;            
            console.log(`Triggering build for vscodium version: ${latestTag}`);

            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'build.yml', 
                ref: 'main',
                inputs: {
                  version: latestTag,
                }
              });
              console.log("Workflow dispatched successfully.");
            } catch (error) {
              console.error("Failed to dispatch workflow:", error);
              core.setFailed(error.message);
            }